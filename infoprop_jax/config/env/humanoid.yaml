name: Humanoid
env_name: humanoid

control_interval: 5
forward_reward_weight: 1.25
ctrl_cost_weight: 0.1
healthy_reward: 5.0
terminate_when_unhealthy: true
healthy_z_range: [1.0, 2.0]
reset_noise_scale: 1e-2
exclude_current_positions_from_observation: true

# History parameters for model learning. Humanoid predicts a local floating-base
# state and carries [yaw, x, y] as integrated context.
obs_history: 1
act_history: 1

# Skip building the MJX pipeline_state during model rollouts (env-side optimisation).
fast_model_rollout: true
